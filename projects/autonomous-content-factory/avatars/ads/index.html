<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Деньги онлайн без лица — рекламный креатив (fallback)</title>
<style>
  :root{
    --bg1:#0d1b2a; --bg2:#1b263b; --accent:#f4b942; --text:#e8eef5; --muted:#9bb0c9;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background:radial-gradient(120% 120% at 70% 10%,var(--bg2),var(--bg1));
    color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding:24px;
  }
  .creative{
    width:100%; max-width:900px; background:linear-gradient(160deg,#13243a,#0c1726);
    border:1px solid rgba(244,185,66,.25); border-radius:20px; overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,.55); display:grid; grid-template-columns:1fr 1fr;
  }
  .left{padding:40px 36px; display:flex; flex-direction:column; justify-content:center; gap:18px}
  .badge{display:inline-block; align-self:flex-start; background:rgba(244,185,66,.12);
    color:var(--accent); border:1px solid rgba(244,185,66,.4); padding:6px 14px; border-radius:999px;
    font-size:13px; letter-spacing:.5px; text-transform:uppercase}
  h1{font-size:34px; line-height:1.15; font-weight:800}
  h1 span{color:var(--accent)}
  p.sub{color:var(--muted); font-size:16px; line-height:1.5}
  .cta{margin-top:6px; background:var(--accent); color:#1a1206; font-weight:700; border:none;
    padding:14px 22px; border-radius:12px; font-size:16px; cursor:pointer; width:fit-content}
  .right{position:relative; min-height:420px; background:
    radial-gradient(80% 60% at 50% 30%,rgba(244,185,66,.18),transparent 70%),
    linear-gradient(180deg,#102033,#0a1422); display:flex; align-items:flex-end; justify-content:center}
  /* Аватар-силуэт (inline SVG, без лица) */
  .silhouette{width:78%; margin-bottom:-2px; filter:drop-shadow(0 20px 30px rgba(0,0,0,.6))}
  .glow{position:absolute; inset:auto 0 0 0; height:55%;
    background:linear-gradient(0deg,rgba(244,185,66,.18),transparent); pointer-events:none}
  .tag{position:absolute; top:16px; right:16px; font-size:12px; color:var(--muted);
    background:rgba(255,255,255,.06); padding:6px 10px; border-radius:8px}
  @media(max-width:720px){.creative{grid-template-columns:1fr}.right{min-height:300px}}
</style>
</head>
<body>
  <div class="creative">
    <div class="left">
      <span class="badge">Без лица · Свой аватар</span>
      <h1>Деньги онлайн <span>без лица</span></h1>
      <p class="sub">Система Дмитрия Чекмарева: строй личный бренд и зарабатывай на
        рекламе — анонимно. Faceless-аватар, премиальный визуал, доверие аудитории.</p>
      <button class="cta">Забрать пак аватаров →</button>
    </div>
    <div class="right">
      <span class="tag">ref: silhouette-01</span>
      <!-- Аватар-силуэт: человек в костюме со спины, лицо скрыто -->
      <svg class="silhouette" viewBox="0 0 300 420" xmlns="http://www.w3.org/2000/svg" aria-label="Faceless business silhouette">
        <defs>
          <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#2a3b54"/>
            <stop offset="1" stop-color="#0e1a2b"/>
          </linearGradient>
        </defs>
        <!-- голова (со спины, без черт лица) -->
        <ellipse cx="150" cy="58" rx="34" ry="40" fill="url(#g)"/>
        <!-- плечи + торс в блейзере -->
        <path d="M70 160 Q150 110 230 160 L250 400 L50 400 Z" fill="url(#g)"/>
        <!-- лацканы -->
        <path d="M150 120 L120 400 M150 120 L180 400" stroke="#0a1422" stroke-width="6" fill="none" opacity=".5"/>
        <!-- контурный свет по плечу -->
        <path d="M70 160 Q150 110 230 160" stroke="#f4b942" stroke-width="3" fill="none" opacity=".55"/>
      </svg>
      <div class="glow"></div>
    </div>
  </div>

  <script>
    // Fallback-режим: без ключей/FAL/Sora и без GPU выводим готовый HTML/CSS макет.
    // Реальное фото-аватар можно подставить, заменив SVG на <img src="shared/references/...jpeg">
    document.querySelector('.cta').addEventListener('click',()=>{
      alert('Fallback-креатив готов. Подставьте сгенерированный аватар в .right → <img>.');
    });
  </script>
</body>
</html>
